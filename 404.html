{% extends 'base.html' %}

{% block title %}
Error 404
{% endblock %}
{% block content %}
<div class="wrapper">
    <h1 class="title">Error 404- Page not found</h1>
    <br>
    <div id="error-message" class="error">{{ error_message }}</div>
    <br>
    <br>
    {% if not current_user.is_authenticated %}
    <button class="btn" onclick="window.location.href = '/login'">Back to login</button>
    {% endif %}

    {% if current_user.is_authenticated %}
    <button class="btn" onclick="window.location.href = '/dashboard'">Back to dashboard</button>
    {% endif %}
</div>

<script src="{{ url_for('static', filename='js/api.js') }}"></script>

<script>
    const serverErrorMessage = "{{ error_message }}";

    showError(serverErrorMessage);
</script>
{% endblock %}
