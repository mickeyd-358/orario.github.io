<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/o_logo.png') }}">
    <title>{% block title %} {% endblock %}</title>
    <link rel="stylesheet" type="text/css" href = "{{ url_for('static', filename='css/style.css') }}">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
</head>
<nav class="main-navbar">
    <div class="nav-container">
        
        {% if current_user.is_authenticated %}
            <div class="nav-left">
                <a href="{{ url_for('dashboard') }}" class="nav-item {{ 'active' if request.endpoint == 'dashboard' else '' }}">
                    🏠 Dashboard
                </a>
                <a href="{{ url_for('genai.flashcards_dashboard') }}" class="nav-item {{ 'active' if request.endpoint == 'genai.flashcards_dashboard' else '' }}">
                    ⚡ Flashcard Maker
                </a>
                <a href="{{ url_for('pomodoro.timer_dashboard') }}" class="nav-item {{ 'active' if request.endpoint == 'pomodoro.timer_dashboard' else '' }}">
                    ⏳ Pomodoro Timer
                </a>
            </div>

            <div class="nav-right">
                <form id="logout-form" action="{{ url_for('logout') }}" method="POST" style="margin: 0;">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="nav-btn-logout">Logout</button>
                </form>
            </div>
        {% else %}
            <div class="nav-left">
                <a href="{{ url_for('home') }}" class="nav-item {{ 'active' if request.endpoint == 'home' else '' }}">
                    Home
                </a>
            </div>
            <div class="nav-right">
                <a href="{{ url_for('auth.login') }}" class="nav-item {{ 'active' if request.endpoint == 'auth.login' else '' }}">
                    Login
                </a>
                <a href="{{ url_for('register') }}" class="nav-item nav-btn-signup {{ 'active' if request.endpoint == 'register' else '' }}">
                    Sign Up
                </a>
            </div>
        {% endif %}
    <div class="theme-switch-container">
        <label class="switch">
            <input type="checkbox" id="toggleCheckbox" hidden>
            <span class="slider-round"></span>
        </label>
        <em id="light-dark-indicator">Enable Light Mode!</em>
    </div>
    </div>
</nav>
<body>

    {% block content %}
    {% endblock %}
    <script src = "../static/js/api.js"></script>
    <script src = "../static/js/logout_validation.js"></script>
    <script src="../static/js/change_theme.js"></script>
</body>
<div id="error-message" class="error"></div>
<div id="success-message" class="success"></div>
</html>
